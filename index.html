<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator - Faris Zaini</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 15px; margin: 0; }
        .gen-container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        h1 { text-align: center; color: #00796b; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #009688; padding-bottom: 10px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #333; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 120px; font-family: monospace; }
        .btn-generate { background: #009688; color: white; border: none; padding: 18px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        #output-section { margin-top: 30px; display: none; }
        #final-code-box { width: 100%; height: 300px; background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 13px; }
        .btn-copy { background: #34495e; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="gen-container">
    <h1>ക്വിസ് കോഡ് ജനറേറ്റർ (Faris Zaini)</h1>
    
    <div class="input-grid">
        <div><label>ക്ലാസ്:</label><input type="text" id="cls" value="8"></div>
        <div><label>വിഷയം:</label><input type="text" id="sub" value="ഫിഖ്ഹ്"></div>
        <div><label>പാർട്ട്:</label><input type="text" id="prt" value="1"></div>
        <div><label>പാഠം നമ്പർ:</label><input type="text" id="lsn_no" value="1"></div>
        <div style="grid-column: span 1;"><label>പാഠത്തിന്റെ പേര്:</label><input type="text" id="lsn_name" value="ത്വഹാറത്ത്"></div>
    </div>

    <div style="margin-top: 20px;">
        <label>ക്വിസ് ചോദ്യങ്ങൾ (JSON Format):</label>
        <textarea id="data">[
  { "q": "ത്വഹാറത്ത് എന്നാൽ എന്ത്?", "a": "പരിശുദ്ധി", "o": ["ആരോഗ്യം", "പരിശുദ്ധി", "ഭംഗി"] }
]</textarea>
    </div>

    <button class="btn-generate" onclick="generateNow()">കോഡ് തയ്യാറാക്കുക</button>

    <div id="output-section">
        <label>ഈ കോഡ് കോപ്പി ചെയ്യുക:</label>
        <textarea id="final-code-box" readonly></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">കോഡ് കോപ്പി ചെയ്യുക</button>
    </div>
</div>

<script>
function generateNow() {
    var v_cls = document.getElementById('cls').value || "8";
    var v_sub = document.getElementById('sub').value || "വിഷയം";
    var v_prt = document.getElementById('prt').value || "1";
    var v_lsn_no = document.getElementById('lsn_no').value || "1";
    var v_lsn_name = document.getElementById('lsn_name').value || "പാഠം പേര്";
    var v_data = document.getElementById('data').value;

    var template = '<!DOCTYPE html>\n' +
'<html lang="ml">\n' +
'<head>\n' +
'<meta charset="UTF-8">\n' +
'<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">\n' +
'<title>Quiz App</title>\n' +
'<style>\n' +
'    body { font-family: "Noto Sans Malayalam", sans-serif; background-color: #e8eceb; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }\n' +
'    body::before { content: "Developed by Faris Zaini Mannarkkad 9895993822"; position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: rgba(0,0,0,0.04); transform: rotate(-30deg); pointer-events: none; z-index: 0; }\n' +
'    #game-box { background: #fff; padding: 25px; width: 100vw; min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 1; }\n' +
'    @media (min-width: 600px) { #game-box { width: 100%; max-width: 500px; min-height: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); } body { padding: 20px; } }\n' +
'    .header-info { color: #00796b; font-size: 14px; font-weight: bold; margin-bottom: 5px; }\n' +
'    h2 { color: #2c3e50; font-size: 1.5rem; margin: 5px 0 20px; border-bottom: 3px solid #009688; padding-bottom: 10px; line-height: 1.4; }\n' +
'    .input-container { position: relative; width: 100%; margin: 25px 0; }\n' +
'    input { width: 100%; padding: 18px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; text-align: center; box-sizing: border-box; outline: none; }\n' +
'    .dropdown-list { position: absolute; bottom: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; border-radius: 12px 12px 0 0; max-height: 200px; overflow-y: auto; z-index: 999; display: none; text-align: left; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }\n' +
'    .dropdown-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }\n' +
'    .delete-btn { color: #d32f2f; font-weight: bold; padding: 5px 10px; font-size: 20px; }\n' +
'    .btn { display: block; width: 100%; padding: 18px; margin: 12px 0; border: none; border-radius: 15px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.2s; box-sizing: border-box; }\n' +
'    .start-btn { background: #009688; color: white; box-shadow: 0 4px 10px rgba(0,150,136,0.3); }\n' +
'    .option-btn { background: #f8fbfb; border: 1px solid #cfd8dc; text-align: right; padding-right: 25px; font-weight: normal; color: #37474f; font-size: 17px; }\n' +
'    #info-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 16px; font-weight: bold; color: #546e7a; }\n' +
'    .hidden { display: none !important; }\n' +
'    .certificate { background: #fff; border: 6px double #009688; padding: 20px; margin: 15px 0; border-radius: 15px; }\n' +
'    .cert-row { display: flex; justify-content: space-between; margin: 8px 0; border-bottom: 1px dashed #ccc; padding-bottom: 4px; font-size: 15px; }\n' +
'    .point-box { background: #fff3e0; padding: 12px; border-radius: 10px; border: 1px solid #ffe0b2; margin: 15px 0; color: #e65100; }\n' +
'    .success-msg { margin-top: 15px; padding: 10px; background: #e0f2f1; color: #00695c; border-radius: 10px; font-size: 14px; line-height: 1.6; text-align: center; }\n' +
'</style>\n' +
'</head>\n' +
'<body>\n' +
'<div id="game-box">\n' +
'    <div style="text-align:center; font-size:10px; color:#ccc; margin-bottom:5px;">Faris Zaini Mannarkkad | 9895993822</div>\n' +
'    <div id="start-screen">\n' +
'        <div class="header-info">' + v_sub + ' - പാർട്ട് ' + v_prt + '</div>\n' +
'        <h2>ക്ലാസ് ' + v_cls + ' | പാഠം ' + v_lsn_no + '<br><span style="color:#00796b;">' + v_lsn_name + '</span></h2>\n' +
'        <div class="input-container">\n' +
'            <input type="text" id="player-name" placeholder="നിങ്ങളുടെ പേര് ടൈപ്പ് ചെയ്യുക" autocomplete="off" onfocus="showDropdown()">\n' +
'            <div id="names-dropdown" class="dropdown-list"></div>\n' +
'        </div>\n' +
'        <button class="btn start-btn" onclick="startGame()">ക്വിസ് തുടങ്ങാം</button>\n' +
'    </div>\n' +
'    <div id="quiz-screen" class="hidden">\n' +
'        <div id="info-bar"><span>ചോദ്യം: <span id="q-no"></span>/<span id="total-q"></span></span><span id="timer">⏱ <span id="seconds">0</span>s</span></div>\n' +
'        <div id="question" style="font-size:1.3rem; font-weight:bold; margin-bottom:30px; text-align: right; line-height: 1.6; color:#2c3e50;"></div>\n' +
'        <div id="options"></div>\n' +
'    </div>\n' +
'    <div id="win-screen" class="hidden">\n' +
'        <h2 style="color: #2e7d32; border: none; text-align:center;">🎉 അഭിനന്ദനങ്ങൾ!</h2>\n' +
'        <div class="certificate">\n' +
'            <h3 style="text-align:center; margin-top:0;">വിജയ സർട്ടിഫിക്കറ്റ്</h3>\n' +
'            <div class="cert-row"><span>പേര്:</span> <b id="final-name"></b></div>\n' +
'            <div class="cert-row"><span>ശ്രമം:</span> <b id="final-attempts"></b></div>\n' +
'            <div class="cert-row"><span>സമയം:</span> <b><span id="final-duration"></span> s</b></div>\n' +
'            <div class="cert-row"><span>പൂർത്തിയാക്കിയത്:</span> <b id="final-real-time"></b></div>\n' +
'            <div class="point-box"><div style="display:flex; justify-content:space-between; font-size:18px;"><span>ആകെ പോയിന്റ്:</span> <b id="final-points"></b></div></div>\n' +
'            <div class="success-msg">ക്ലാസ് ' + v_cls + ' ' + v_sub + ' (പാർട്ട് ' + v_prt + ')<br>പാഠം ' + v_lsn_no + ': ' + v_lsn_name + ' വിജയിച്ചു.</div>\n' +
'            <p style="text-align:center; font-size:11px; color:#00796b; margin-top:10px;">Developed by Faris Zaini Mannarkkad (9895993822)</p>\n' +
'        </div>\n' +
'        <p style="background: #fff9c4; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center;">📸 ഈ സർട്ടിഫിക്കറ്റ് സ്ക്രീൻഷോട്ട് എടുത്ത് ഉസ്താദിന് അയച്ചു കൊടുക്കുക.</p>\n' +
'        <button class="btn start-btn" onclick="location.reload()">വീണ്ടും കളിക്കുക</button>\n' +
'    </div>\n' +
'    <div id="error-screen" class="hidden">\n' +
'        <h2 style="color: #c62828; border: none;">പരാജയപ്പെട്ടു!</h2>\n' +
'        <div id="fail-msg" style="background:#ffebee; padding:20px; border-radius:15px; margin-bottom:20px; font-size:18px;"></div>\n' +
'        <button class="btn start-btn" onclick="location.reload()">വീണ്ടും ശ്രമിക്കുക</button>\n' +
'    </div>\n' +
'</div>\n' +
'<script>\n' +
'const quizData = ' + v_data + ';\n' +
'let currentIndex = 0, secondsElapsed = 0, timerInterval, playerName = "", attempts = 1;\n' +
'window.onload = updateDropdown;\n' +
'function startGame() {\n' +
'    playerName = document.getElementById("player-name").value.trim();\n' +
'    if (!playerName) { alert("പേര് നൽകുക!"); return; }\n' +
'    let players = JSON.parse(localStorage.getItem("all_players")) || [];\n' +
'    if (!players.includes(playerName)) { players.push(playerName); localStorage.setItem("all_players", JSON.stringify(players)); }\n' +
'    let storageKey = "stats_" + playerName + "_" + "' + v_sub + '" + "_L" + "' + v_lsn_no + '";\n' +
'    let stats = JSON.parse(localStorage.getItem(storageKey)) || { count: 0 };\n' +
'    attempts = stats.count + 1;\n' +
'    localStorage.setItem(storageKey, JSON.stringify({ count: attempts }));\n' +
'    shuffle(quizData); currentIndex = 0; secondsElapsed = 0;\n' +
'    document.getElementById("total-q").innerText = quizData.length;\n' +
'    document.getElementById("start-screen").classList.add("hidden");\n' +
'    document.getElementById("quiz-screen").classList.remove("hidden");\n' +
'    timerInterval = setInterval(() => { secondsElapsed++; document.getElementById("seconds").innerText = secondsElapsed; }, 1000);\n' +
'    showQuestion();\n' +
'}\n' +
'function updateDropdown() {\n' +
'    const list = document.getElementById("names-dropdown"); list.innerHTML = "";\n' +
'    const players = JSON.parse(localStorage.getItem("all_players")) || [];\n' +
'    players.forEach(name => {\n' +
'        let item = document.createElement("div"); item.className = "dropdown-item";\n' +
'        item.onmousedown = () => { document.getElementById("player-name").value = name; document.getElementById("names-dropdown").style.display = "none"; };\n' +
'        item.innerHTML = "<span>" + name + "</span><span class=\'delete-btn\' onclick=\'event.stopPropagation(); deleteName(\\"" + name + "\\")\'>✕</span>";\n' +
'        list.appendChild(item);\n' +
'    });\n' +
'}\n' +
'function deleteName(name) {\n' +
'    let players = JSON.parse(localStorage.getItem("all_players")) || [];\n' +
'    players = players.filter(p => p !== name);\n' +
'    localStorage.setItem("all_players", JSON.stringify(players));\n' +
'    updateDropdown();\n' +
'}\n' +
'function showDropdown() { const p = JSON.parse(localStorage.getItem("all_players")) || []; if(p.length > 0) document.getElementById("names-dropdown").style.display = "block"; }\n' +
'function shuffle(array) { return array.sort(() => Math.random() - 0.5); }\n' +
'function showQuestion() {\n' +
'    let q = quizData[currentIndex];\n' +
'    document.getElementById("q-no").innerText = currentIndex + 1;\n' +
'    document.getElementById("question").innerText = q.q;\n' +
'    let optDiv = document.getElementById("options"); optDiv.innerHTML = "";\n' +
'    let options = [...q.o]; shuffle(options);\n' +
'    options.forEach(opt => {\n' +
'        let btn = document.createElement("button"); btn.className = "btn option-btn"; btn.innerText = opt;\n' +
'        btn.onclick = () => { if (opt === q.a) { currentIndex++; if (currentIndex < quizData.length) showQuestion(); else showWin(); } else { gameOver(q.a); } };\n' +
'        optDiv.appendChild(btn);\n' +
'    });\n' +
'}\n' +
'function gameOver(correct) { clearInterval(timerInterval); document.getElementById("quiz-screen").classList.add("hidden"); document.getElementById("error-screen").classList.remove("hidden"); document.getElementById("fail-msg").innerHTML = "ഉത്തരം തെറ്റാണ്! <br><br>ശരിയായ ഉത്തരം: <br><b style=\'color:#009688;\'>" + correct + "</b>"; }\n' +
'function showWin() {\n' +
'    clearInterval(timerInterval);\n' +
'    document.getElementById("quiz-screen").classList.add("hidden");\n' +
'    document.getElementById("win-screen").classList.remove("hidden");\n' +
'    document.getElementById("final-name").innerText = playerName;\n' +
'    document.getElementById("final-attempts").innerText = attempts;\n' +
'    document.getElementById("final-duration").innerText = secondsElapsed;\n' +
'    document.getElementById("final-points").innerText = (attempts * 100) + secondsElapsed;\n' +
'    const now = new Date();\n' +
'    document.getElementById("final-real-time").innerText = now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: true }) + " | " + now.toLocaleDateString("en-GB");\n' +
'}\n' +
'<\/script>\n' +
'</body>\n' +
'</html>';

    document.getElementById('final-code-box').value = template;
    document.getElementById('output-section').style.display = 'block';
}

function copyToClipboard() {
    var box = document.getElementById('final-code-box');
    box.select();
    document.execCommand('copy');
    alert("കോഡ് കോപ്പി ചെയ്തു!");
}
</script>
</body>
</html>
